name: proxy-pages

on:
  push:
    branches:
      - main
    paths:
      - "addons/proxy/**"
      - "site/**"
      - ".github/workflows/proxy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: proxy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - X64
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Stage static site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp site/index.html _site/index.html
          cp site/main.js _site/main.js
          cp site/styles.css _site/styles.css
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
