name: Jim Contract Compliance

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  jim-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Validate shell scripts
        run: |
          bash -n scripts/*.sh

      - name: Verify contract package and installation
        run: |
          bun ./jim.ts verify-contract --contract-version v1
          bun ./jim.ts verify-contract --path . --contract-version v1 --strict-path
