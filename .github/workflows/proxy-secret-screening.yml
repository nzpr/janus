name: proxy-secret-screening
on:
  pull_request:
    paths:
      - "codex-rs/responses-api-proxy/**"
      - ".github/workflows/proxy-secret-screening.yml"
  push:
    branches:
      - main
    paths:
      - "codex-rs/responses-api-proxy/**"
      - ".github/workflows/proxy-secret-screening.yml"
  workflow_dispatch:

jobs:
  proxy_secret_screening:
    name: Proxy secret screening regression
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Run proxy secret screening regression
        run: cargo test -p codex-responses-api-proxy sanitizes_leakwall_style_prompt_fixture -- --nocapture
