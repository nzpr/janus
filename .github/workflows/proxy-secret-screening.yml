name: proxy-secret-screening
on:
  pull_request:
    paths:
      - "codex-rs/responses-api-proxy/**"
      - ".github/workflows/proxy-secret-screening.yml"
  push:
    branches:
      - main
    paths:
      - "codex-rs/responses-api-proxy/**"
      - ".github/workflows/proxy-secret-screening.yml"
  workflow_dispatch:

jobs:
  proxy_secret_screening:
    name: Proxy secret screening regression
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.93.0
      - name: Run proxy secret screening regression
        run: cargo test -p codex-responses-api-proxy sanitizes_leakwall_style_prompt_fixture -- --nocapture

  proxy_auth_json_smoke:
    name: Proxy auth.json smoke
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: codex-rs
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.93.0

      - name: Check auth.json secret
        id: auth_json
        env:
          PROXY_AUTH_JSON: ${{ secrets.PROXY_AUTH_JSON }}
        shell: bash
        run: |
          if [[ -n "${PROXY_AUTH_JSON}" ]]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping auth.json smoke test because secret PROXY_AUTH_JSON is not configured."
          fi

      - name: Build proxy binary
        if: ${{ steps.auth_json.outputs.configured == 'true' }}
        run: cargo build -p codex-responses-api-proxy

      - name: Smoke test auth.json forwarding
        if: ${{ steps.auth_json.outputs.configured == 'true' }}
        env:
          PROXY_AUTH_JSON: ${{ secrets.PROXY_AUTH_JSON }}
        shell: bash
        run: |
          set -euo pipefail

          codex_home="${RUNNER_TEMP}/codex-home"
          mkdir -p "${codex_home}"
          auth_json_path="${codex_home}/auth.json"
          printf '%s' "${PROXY_AUTH_JSON}" > "${auth_json_path}"
          chmod 600 "${auth_json_path}"

          expected_json="${RUNNER_TEMP}/expected-auth.json"
          python3 - "${auth_json_path}" "${expected_json}" <<'PY'
          import json
          import sys

          auth_path, expected_path = sys.argv[1:3]
          with open(auth_path, "r", encoding="utf-8") as fh:
              auth = json.load(fh)

          tokens = auth.get("tokens") or {}
          token = tokens.get("access_token") or auth.get("OPENAI_API_KEY")
          if not token:
              raise SystemExit("auth.json secret must contain tokens.access_token or OPENAI_API_KEY")

          expected = {
              "authorization": f"Bearer {token}",
              "account_id": tokens.get("account_id"),
          }
          with open(expected_path, "w", encoding="utf-8") as fh:
              json.dump(expected, fh)
          PY

          upstream_info="${RUNNER_TEMP}/upstream-info.json"
          upstream_capture="${RUNNER_TEMP}/upstream-capture.json"
          python3 - "${upstream_info}" "${upstream_capture}" <<'PY' &
          import http.server
          import json
          import socketserver
          import sys

          info_path, capture_path = sys.argv[1:3]

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get("content-length", "0"))
                  body = self.rfile.read(length).decode("utf-8")
                  payload = {
                      "path": self.path,
                      "headers": {key.lower(): value for key, value in self.headers.items()},
                      "body": body,
                  }
                  with open(capture_path, "w", encoding="utf-8") as fh:
                      json.dump(payload, fh)
                  response = json.dumps({"ok": True}).encode("utf-8")
                  self.send_response(200)
                  self.send_header("content-type", "application/json")
                  self.send_header("content-length", str(len(response)))
                  self.end_headers()
                  self.wfile.write(response)

              def log_message(self, format, *args):
                  pass

          class TCPServer(socketserver.TCPServer):
              allow_reuse_address = True

          with TCPServer(("127.0.0.1", 0), Handler) as server:
              with open(info_path, "w", encoding="utf-8") as fh:
                  json.dump({"port": server.server_address[1]}, fh)
              server.handle_request()
          PY
          upstream_pid=$!

          cleanup() {
            if [[ -n "${proxy_pid:-}" ]]; then
              kill "${proxy_pid}" >/dev/null 2>&1 || true
            fi
            kill "${upstream_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 50); do
            [[ -f "${upstream_info}" ]] && break
            sleep 0.2
          done
          [[ -f "${upstream_info}" ]]
          upstream_port="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["port"])' "${upstream_info}")"

          proxy_info="${RUNNER_TEMP}/proxy-info.json"
          ./target/debug/codex-responses-api-proxy \
            --auth-json \
            --codex-home "${codex_home}" \
            --upstream-url "http://127.0.0.1:${upstream_port}/mock/responses" \
            --server-info "${proxy_info}" \
            --http-shutdown \
            >"${RUNNER_TEMP}/proxy.log" 2>&1 &
          proxy_pid=$!

          for _ in $(seq 1 50); do
            [[ -f "${proxy_info}" ]] && break
            sleep 0.2
          done
          [[ -f "${proxy_info}" ]]
          proxy_port="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["port"])' "${proxy_info}")"

          curl --fail --silent --show-error \
            -X POST \
            -H 'content-type: application/json' \
            -d '{"model":"gpt-5.1","input":"hello from gha"}' \
            "http://127.0.0.1:${proxy_port}/v1/responses" \
            >/dev/null

          python3 - "${expected_json}" "${upstream_capture}" <<'PY'
          import json
          import sys

          expected_path, actual_path = sys.argv[1:3]
          with open(expected_path, "r", encoding="utf-8") as fh:
              expected = json.load(fh)
          with open(actual_path, "r", encoding="utf-8") as fh:
              actual = json.load(fh)

          headers = actual["headers"]
          assert actual["path"] == "/mock/responses", actual
          assert headers.get("authorization") == expected["authorization"], headers

          expected_account_id = expected.get("account_id")
          actual_account_id = headers.get("chatgpt-account-id")
          if expected_account_id:
              assert actual_account_id == expected_account_id, headers
          else:
              assert actual_account_id is None, headers
          PY

          curl --fail --silent --show-error "http://127.0.0.1:${proxy_port}/shutdown" >/dev/null
          wait "${proxy_pid}"
